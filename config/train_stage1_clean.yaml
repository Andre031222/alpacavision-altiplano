# AlpacaVision AI — Etapa 1 LIMPIA: YOLOv11n detector base (sin leakage)
# Dataset deduplicado (2051 unicas) y re-split honesto. RTX 3050 4GB.

model:   yolo11n.pt
data:    config/dataset_stage1_clean.yaml
epochs:  80
patience: 15
batch:   8          # seguro para 4GB VRAM
imgsz:   640
device:  0          # GPU
workers: 4
project: outputs/training_runs
name:    stage1_clean_detector
save:         true
save_period:  10
val:          true
plots:        true

# Aumentación
hsv_h:    0.015
hsv_s:    0.7
hsv_v:    0.4
degrees:  10.0
translate: 0.1
scale:    0.5
fliplr:   0.5
mosaic:   1.0
mixup:    0.05

# Optimizador
optimizer:     AdamW
lr0:           0.001
lrf:           0.01
weight_decay:  0.0005
warmup_epochs: 3.0
